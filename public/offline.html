<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — OutreachFlow</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background: #08111f;
        color: #ecf5ff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1.5rem;
        text-align: center;
      }
      .card {
        max-width: 320px;
      }
      .icon {
        font-size: 3rem;
        margin-bottom: 1rem;
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
      }
      p {
        font-size: 0.9rem;
        color: #94a3b8;
        line-height: 1.5;
      }
      button {
        margin-top: 1.5rem;
        background: #f97316;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 0.75rem 1.5rem;
        font-size: 0.9rem;
        font-weight: 600;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">📵</div>
      <h1>You're offline</h1>
      <p>
        OutreachFlow needs a connection to sync. Your cached prospects are
        still available — open the app to view them.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
